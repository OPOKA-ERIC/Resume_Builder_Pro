services:
  - type: web
    name: resume-builder-pro
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn resume_builder_pro.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          name: resume-builder-pro
          property: host
      - key: DATABASE_URL
        fromDatabase:
          name: resume-builder-db
          property: connectionString
      - key: WEB_CONCURRENCY
        value: "3"
    databases:
      - name: resume-builder-db
        plan: free
