{% extends "base.html" %}
{% block title %}Login - Resume Builder Pro{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card animate-fade-in-up">
        <div class="auth-card-header">
            <div class="auth-icon">
                <i class="bi bi-box-arrow-in-right"></i>
            </div>
            <h3>Welcome Back</h3>
            <p>Sign in to your account</p>
        </div>
        <div class="auth-card-body">
            <form method="post" novalidate>
                {% csrf_token %}
                <div class="mb-3">
                    <label for="id_username" class="form-label">Username</label>
                    <div class="input-group-icon">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" name="username" id="id_username" class="form-control" placeholder="Enter your username" required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">Password</label>
                    <div class="input-group-icon">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" name="password" id="id_password" class="form-control" placeholder="Enter your password" required>
                        <button type="button" class="password-toggle" onclick="togglePassword(this)" title="Show password">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 mt-3 btn-icon">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>
            <div class="text-center mt-4">
                <p class="mb-0 text-muted">
                    Don't have an account? <a href="{% url 'accounts:register' %}" class="auth-link">Create one</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
