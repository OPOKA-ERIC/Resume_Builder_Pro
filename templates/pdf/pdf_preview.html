{% extends "base.html" %}
{% block title %}PDF Preview - {{ resume.title }}{% endblock %}

{% block content %}
<div class="animate-fade-in-up">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h3 class="mb-1"><i class="bi bi-file-earmark-pdf me-2" style="color: var(--danger);"></i>PDF Preview</h3>
            <small class="text-muted">{{ resume.title }}</small>
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'pdf_export:download_pdf' resume.id %}" class="btn btn-success btn-icon">
                <i class="bi bi-download"></i> Download PDF
            </a>
            <a href="{% url 'resumes:resume_preview' resume.id %}" class="btn btn-outline-secondary btn-icon">
                <i class="bi bi-arrow-left"></i> Back
            </a>
        </div>
    </div>
    <div class="card overflow-hidden">
        <iframe src="{% url 'pdf_export:download_pdf' resume.id %}" class="pdf-preview-frame" title="PDF Preview"></iframe>
    </div>
</div>
{% endblock %}
