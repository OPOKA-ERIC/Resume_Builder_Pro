{% extends "base.html" %}
{% block title %}PDF Preview - {{ resume.title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h3>PDF Preview: {{ resume.title }}</h3>
            <div class="d-flex gap-2">
                <a href="{% url 'pdf_export:download_pdf' resume.id %}" class="btn btn-success">
                    <i class="bi bi-download"></i> Download PDF
                </a>
                <a href="{% url 'resumes:resume_preview' resume.id %}" class="btn btn-outline-secondary">
                    Back to Preview
                </a>
            </div>
        </div>
        <div class="card shadow-sm">
            <div class="card-body p-0">
                <iframe src="{% url 'pdf_export:download_pdf' resume.id %}"
                        style="width: 100%; height: 80vh; border: none;"
                        title="PDF Preview"></iframe>
            </div>
        </div>
    </div>
</div>
{% endblock %}
