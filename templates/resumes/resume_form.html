{% extends "base.html" %}
{% block title %}{{ action }} Resume - Resume Builder Pro{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="animate-fade-in-up">
            <div class="d-flex align-items-center mb-3">
                <a href="{% url 'resumes:dashboard' %}" class="btn btn-sm btn-outline-secondary me-3">
                    <i class="bi bi-arrow-left"></i>
                </a>
                <h3 class="mb-0">{{ action }} Resume</h3>
            </div>

            <div class="card">
                <div class="card-body p-4">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {% for field in form %}
                            <div class="mb-3">
                                <label for="{{ field.id_for_label }}" class="form-label">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1"><i class="bi bi-exclamation-circle"></i> {{ field.errors.0 }}</div>
                                {% endif %}
                            </div>
                        {% endfor %}
                        <div class="d-flex gap-2 mt-4 pt-3 border-top">
                            <button type="submit" class="btn btn-primary btn-icon">
                                <i class="bi bi-arrow-right"></i> Save & Continue
                            </button>
                            <a href="{% url 'resumes:dashboard' %}" class="btn btn-outline-secondary btn-icon">
                                <i class="bi bi-x-lg"></i> Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
