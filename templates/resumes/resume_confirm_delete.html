{% extends "base.html" %}
{% block title %}Delete Resume - Resume Builder Pro{% endblock %}

{% block content %}
<div class="delete-card animate-fade-in-up">
    <div class="delete-card-header">
        <div class="delete-icon">
            <i class="bi bi-trash3"></i>
        </div>
        <h3>Delete Resume</h3>
    </div>
    <div class="delete-card-body">
        <p class="mb-2">Are you sure you want to delete</p>
        <h5 class="fw-bold mb-3">"{{ resume.title }}"?</h5>
        <p class="text-muted mb-4">
            <i class="bi bi-exclamation-triangle text-warning me-1"></i>
            This action cannot be undone. All data will be permanently removed.
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <form method="post" class="d-inline">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger btn-icon">
                    <i class="bi bi-trash3"></i> Yes, Delete
                </button>
            </form>
            <a href="{% url 'resumes:dashboard' %}" class="btn btn-outline-secondary btn-icon">
                <i class="bi bi-x-lg"></i> Cancel
            </a>
        </div>
    </div>
</div>
{% endblock %}
